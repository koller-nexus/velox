---
kind: pipeline
type: docker
name: build-test

trigger:
  event:
    - push
    - pull_request
    - custom
  branch:
    - main

steps:
  - name: gofmt
    image: golang:1.26.4-alpine
    commands:
      - |
        out="$(gofmt -l .)"
        if [ -n "$out" ]; then
          echo "unformatted:"
          echo "$out"
          exit 1
        fi

  - name: go-vet
    image: golang:1.26.4-alpine
    commands:
      - go vet ./...

  - name: golangci-lint
    image: golangci/golangci-lint:v2.12.2-alpine
    commands:
      - golangci-lint run ./...

  - name: test-race
    image: golang:1.26.4-alpine
    environment:
      CGO_ENABLED: '1'
    commands:
      - apk add --no-cache gcc musl-dev
      - go test -race ./...

  - name: build
    image: golang:1.26.4-alpine
    environment:
      CGO_ENABLED: '0'
    commands:
      - go build ./...

---
kind: pipeline
type: docker
name: security

depends_on:
  - build-test

trigger:
  event:
    - push
    - pull_request
    - custom
  branch:
    - main

steps:
  - name: security-gate
    image: golang:1.26.4-alpine
    environment:
      VELOX_SEVERITY: high
    commands:
      - go install github.com/securego/gosec/v2/cmd/gosec@latest
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - ./scripts/security.sh
