# golangci-lint configuration for velox (Constitution Principle I).
version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  exclusions:
    presets:
      # Ignore conventionally-unchecked stdlib errors: fmt.Fprint* to
      # stdout/stderr, Close/Flush in defers, os.Remove cleanup, etc. This
      # matches the codebase's established CLI I/O style.
      - std-error-handling

formatters:
  enable:
    - gofmt
